spring:
  application:
    name: alert-service

  kafka:
    bootstrap-servers: localhost:9094
    consumer:
      group-id: alert-service

  datasource:
    hikari:
      schema: microservices_schema
      connection-init-sql: CREATE SCHEMA IF NOT EXISTS microservices_schema
      connection-timeout: 10000

eureka:
  client:
    service-url:
      defaultZone: http://localhost:9999/eureka/

server:
  port: 8084