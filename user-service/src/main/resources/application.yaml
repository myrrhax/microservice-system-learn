spring:
  application:
    name: user-service

  datasource:
    hikari:
      schema: microservices_schema
      connection-init-sql: CREATE SCHEMA IF NOT EXISTS microservices_schema
      connection-timeout: 10000

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
      dialect: org.hibernate.dialect.PostgresSQLDialect