server:
  port: 9000

spring:
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: user-service
              uri: http://localhost:8080
              predicates:
                - Path=/api/v1/user/**

            - id: device-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/v1/device/**

            - id: ingestion-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/v1/ingestion/**

            - id: usage-service
              uri: http://localhost:8083
              predicates:
                - Path=/api/v1/usage

            - id: alert-service
              uri: http://localhost:8084
              predicates:
                - Path=/api/v1/alert

            - id: insight-service
              uri: http://localhost:8085
              predicates:
                - Path=/api/v1/insight